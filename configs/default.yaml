# UGVU Experiment Configuration
# ===============================

experiment_name: ugvu_cityscapes_semseg
seed: 42
output_dir: outputs/ugvu_cityscapes

# --- Model Registry ---
models:
  # Doubao-1.5-Vision-Pro 鈥?瑙嗚璇█ (image+text 鈫?text 鈫?parsed mask)
  doubao:
    api_endpoint: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: "${DOUBAO_API_KEY}"
    model_version: "ep-m-20260616184522-wp9rq"     # 鈫?浣犵殑 Vision Endpoint ID
    api_mode: "vision_chat"                         # 鏂囨湰杈撳嚭 + 瑙ｆ瀽涓?mask
    timeout_sec: 90
    max_retries: 3
    image_size: [1024, 1024]
    temperature: 1.0

  # Doubao Seedream 鈥?鏂囩敓鍥?(text 鈫?image, 涓嶆帴鏀惰緭鍏ュ浘鐗?
  seedream:
    api_endpoint: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: "${DOUBAO_API_KEY}"
    model_version: "ep-m-20260616184554-ptvr2"   # 鈫?鏇挎崲鎴愪綘鐨?Endpoint ID
    api_mode: "seedream"
    timeout_sec: 120
    max_retries: 3
    image_size: [1920, 1920]                     # Seedream 鏈€灏?1920脳1920
    temperature: 1.0

  qwen:
    # 鍗冮棶 qwen-image-2.0-pro 鈥?DashScope 鍘熺敓鍥惧儚鐢熸垚 API
    api_endpoint: "https://dashscope.aliyuncs.com/api/v1/services/aigc/image-generation/generation"
    api_key: "${DASHSCOPE_API_KEY}"
    model_version: "qwen-image-2.0-pro"
    api_mode: "generation"
    timeout_sec: 120
    max_retries: 3
    image_size: [1024, 1024]
    temperature: 1.0

  qwen-vl:
    # VL 鐞嗚В妯″瀷锛堝鐢級 鈥?鏂囨湰杈撳嚭 + 鍚庡鐞嗚В鏋愪负 mask
    api_endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
    model_version: "qwen-vl-max"
    api_mode: "chat"
    timeout_sec: 90
    max_retries: 3
    image_size: [1024, 1024]
    temperature: 1.0

  gpt-image-2-vip:
    api_endpoint: "https://www.right.codes/draw/v1"
    api_key: "${IMAGE_API_KEY}"
    model_version: "gpt-image-2-vip"
    api_mode: "chat_completions"
    class: "rightcode"
    timeout_sec: 300
    max_retries: 3
    image_size: [1024, 1024]
    size: "1K"
    temperature: 1.0

  gpt-image-2:
    api_endpoint: "https://www.right.codes/draw/v1"
    api_key: "${IMAGE_API_KEY}"
    model_version: "gpt-image-2"
    api_mode: "chat_completions"
    class: "rightcode"
    timeout_sec: 300
    max_retries: 3
    image_size: [1024, 1024]
    size: "1K"
    temperature: 1.0

  nano-banana:
    api_endpoint: "https://www.right.codes/draw/v1"
    api_key: "${IMAGE_API_KEY}"
    model_version: "nano-banana"
    api_mode: "chat_completions"
    class: "rightcode"
    timeout_sec: 300
    max_retries: 3
    image_size: [1024, 1024]
    size: "1K"
    temperature: 1.0

  nano-banana-2:
    api_endpoint: "https://www.right.codes/draw/v1"
    api_key: "${IMAGE_API_KEY}"
    model_version: "nano-banana-2"
    api_mode: "chat_completions"
    class: "rightcode"
    timeout_sec: 300
    max_retries: 3
    image_size: [1024, 1024]
    size: "1K"
    temperature: 1.0

  nano-banana-pro:
    api_endpoint: "https://www.right.codes/draw/v1"
    api_key: "${IMAGE_API_KEY}"
    model_version: "nano-banana-pro"
    api_mode: "chat_completions"
    class: "rightcode"
    timeout_sec: 300
    max_retries: 3
    image_size: [1024, 1024]
    size: "1K"
    temperature: 1.0

  flux:
    api_endpoint: "https://api.bfl.ml"
    api_key: "${FLUX_API_KEY}"
    model_version: "flux-pro-1.1"
    timeout_sec: 120
    max_retries: 3
    image_size: [1024, 1024]
    temperature: 1.0

# --- Sampling ---
sampling:
  k_samples: 5
  parallel: true
  max_concurrent: 4
  seed: 42
  output_dir: outputs/samples
  adaptive: false
  min_samples: 3
  uncertainty_threshold: 0.15
  check_interval: 1

# --- Consensus ---
consensus:
  method: ugcf                     # majority | ugcf | cmcf
  uncertainty_type: entropy        # entropy | variance
  weight_temperature: 0.5
  cross_model_models:
    - doubao
    - qwen
  iou_threshold: 0.5

# --- Calibration ---
calibration:
  num_bins: 15
  strategy: uniform                # uniform | quantile
  metrics:
    - ece
    - mce
    - spearman

# --- Robustness ---
robustness:
  num_prompt_variants: 50
  generation_repeats: 20
  models_to_compare:
    - doubao
    - qwen
  k_values: [1, 3, 5, 10]

# --- Task / Dataset ---
task:
  task: semantic_segmentation
  dataset: cityscapes
  data_root: data/cityscapes
  num_classes: 19
  ignore_index: 255
  batch_size: 1
  num_workers: 4
  max_samples: null
